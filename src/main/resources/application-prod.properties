# Production profile - Railway PostgreSQL
# These values are automatically injected by Railway as environment variables
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false

# Server port - Railway injects PORT automatically
server.port=${PORT:8080}

# Disable SQL logging in production
spring.jpa.show-sql=false

# CORS - allow Vercel frontend
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}
